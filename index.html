<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wochenplan">
<meta name="theme-color" content="#0B0F19">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Wochenplan</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0B0F19;
  --bg-secondary: #111827;
  --bg-card: rgba(30,41,59,0.5);
  --border-subtle: rgba(148,163,184,0.06);
  --text-primary: #F1F5F9;
  --text-secondary: #E2E8F0;
  --text-muted: #94A3B8;
  --text-dim: #64748B;
  --text-dark: #475569;
  --accent-blue: #60A5FA;
  --accent-purple: #A78BFA;
  --accent-green: #34D399;
  --accent-amber: #F59E0B;
  --font-body: 'Outfit', 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  min-height: 100%;
  background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #0F172A 100%);
  color: var(--text-secondary);
  font-family: var(--font-body);
  -webkit-tap-highlight-color: transparent;
  padding-bottom: calc(40px + var(--safe-bottom));
  overflow-x: hidden;
}
.header {
  background: linear-gradient(135deg, rgba(59,130,246,0.12) 0%, rgba(139,92,246,0.08) 100%);
  border-bottom: 1px solid rgba(148,163,184,0.08);
  padding: calc(16px + var(--safe-top)) 20px 14px;
  position: sticky; top: 0; z-index: 50;
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
}
.header-inner { max-width: 900px; margin: 0 auto; }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.title {
  font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.subtitle { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }
.header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.btn-sm {
  border-radius: 8px; padding: 6px 12px; font-size: 11px;
  cursor: pointer; font-family: var(--font-mono); font-weight: 600; border: 1px solid;
}
.btn-reset { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #F87171; }
.btn-import { background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.2); color: var(--accent-blue); }
.btn-export { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.2); color: var(--accent-green); }
.btn-clear { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #F87171; }
.tabs { display: flex; gap: 4px; }
.tab {
  padding: 7px 16px; border-radius: 8px; border: none;
  background: transparent; color: var(--text-dim);
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: var(--font-body); transition: all 0.2s;
}
.tab.active { background: rgba(96,165,250,0.15); color: var(--accent-blue); }
.content { max-width: 900px; margin: 0 auto; padding: 0 16px; }

/* Status dot */
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.status-online { background: var(--accent-green); }
.status-offline { background: #EF4444; animation: pulse-red 1.5s infinite; }
@keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Empty State */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; }
.empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.8; }
.empty-title { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
.empty-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; max-width: 420px; line-height: 1.6; }
.upload-zone {
  width: 100%; max-width: 400px; border: 2px dashed rgba(96,165,250,0.3);
  border-radius: 16px; padding: 32px 24px; cursor: pointer;
  background: rgba(96,165,250,0.04); transition: all 0.3s; position: relative;
}
.upload-zone:hover, .upload-zone.dragover { border-color: var(--accent-blue); background: rgba(96,165,250,0.08); transform: scale(1.01); }
.upload-zone-icon { font-size: 32px; margin-bottom: 10px; }
.upload-zone-text { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.upload-zone-hint { font-size: 12px; color: var(--text-dim); }
.upload-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.format-hint {
  margin-top: 24px; background: rgba(30,41,59,0.5); border: 1px solid var(--border-subtle);
  border-radius: 12px; padding: 16px 20px; max-width: 500px; text-align: left; width: 100%;
}
.format-hint-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
.format-hint-code {
  font-family: var(--font-mono); font-size: 11px; color: var(--accent-blue);
  background: rgba(96,165,250,0.08); border-radius: 8px; padding: 10px 12px;
  line-height: 1.7; white-space: pre-wrap; overflow-x: auto;
}

/* Day Selector */
.day-selector { display: flex; gap: 6px; padding: 20px 0 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.day-btn {
  flex: 1; min-width: 50px; padding: 10px 4px 6px; border-radius: 12px; border: none;
  background: rgba(30,41,59,0.5); cursor: pointer; text-align: center; transition: all 0.2s;
}
.day-btn.active {
  background: linear-gradient(135deg, rgba(96,165,250,0.2), rgba(139,92,246,0.15));
  box-shadow: 0 0 0 1px rgba(96,165,250,0.3);
}
.day-btn-label { font-size: 13px; font-weight: 600; color: var(--text-muted); font-family: var(--font-mono); }
.day-btn.active .day-btn-label { font-weight: 800; color: var(--accent-blue); }
.day-btn-count { font-size: 9px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 3px; }
.day-btn-count.done { color: var(--accent-green); }
.day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-blue); margin: 4px auto 0; }
.day-reset-btn { font-size: 9px; color: var(--text-dark); background: none; border: none; cursor: pointer; padding: 2px 4px; margin-top: 2px; display: block; width: 100%; line-height: 1; }
.day-reset-btn:hover { color: #F87171; }

.day-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); display: flex; align-items: center; justify-content: space-between; }
.day-title-left { display: flex; align-items: baseline; gap: 8px; }
.day-title-count { font-size: 13px; color: var(--text-dim); font-weight: 400; }

.items { display: flex; flex-direction: column; gap: 6px; }
.item {
  background: var(--bg-card); border-radius: 12px; padding: 12px 14px;
  border: 1px solid var(--border-subtle); cursor: pointer;
  transition: all 0.25s cubic-bezier(.4,0,.2,1);
  display: flex; align-items: center; gap: 12px;
}
.item.checked { background: rgba(52,211,153,0.06); border-color: rgba(52,211,153,0.15); opacity: 0.65; }
.item.time-now { background: rgba(96,165,250,0.08); border-color: rgba(96,165,250,0.3); }
.checkbox {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  border: 2px solid var(--text-dark); background: transparent;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.item.checked .checkbox { border-color: var(--accent-green); background: rgba(52,211,153,0.15); }
.check-mark { color: var(--accent-green); font-size: 13px; font-weight: 700; display: none; }
.item.checked .check-mark { display: block; }
.item-time { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); min-width: 86px; flex-shrink: 0; font-weight: 500; }
.item.time-now .item-time { color: var(--accent-blue); }
.now-badge { display: inline-block; font-size: 8px; background: var(--accent-blue); color: #fff; border-radius: 3px; padding: 1px 4px; font-weight: 700; vertical-align: middle; margin-left: 3px; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.item-content { flex: 1; min-width: 0; }
.item-activity { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
.item.checked .item-activity { text-decoration: line-through; color: var(--text-dim); }
.item-notes { font-size: 11px; color: var(--accent-amber); margin-top: 3px; font-weight: 500; }
.item-duration { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); flex-shrink: 0; font-weight: 500; }
.badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; font-weight: 700; flex-shrink: 0; }
.badge-crit { background: #DC2626; color: #fff; font-weight: 800; }
.badge-high { background: #F59E0B; color: #78350F; }
.badge-mid { background: #60A5FA; color: #1E3A5F; }
.badge-low { background: #A7F3D0; color: #065F46; }
.btn-edit { background: none; border: none; color: var(--text-dark); cursor: pointer; font-size: 14px; padding: 4px; flex-shrink: 0; }

.edit-form { background: rgba(30,41,59,0.8); border-radius: 12px; padding: 16px; border: 1px solid rgba(96,165,250,0.3); }
.edit-form-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
.edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.edit-label { font-size: 10px; color: var(--text-dim); font-weight: 600; display: block; margin-bottom: 3px; }
.edit-input, .edit-select {
  width: 100%; background: #1E293B; border: 1px solid #334155; border-radius: 6px;
  padding: 6px 10px; color: var(--text-secondary); font-size: 13px; font-family: var(--font-body);
}
.edit-input.mono { font-family: var(--font-mono); }
.edit-actions { display: flex; gap: 8px; align-items: center; }
.btn-save { background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3); color: var(--accent-green); border-radius: 8px; padding: 6px 16px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-cancel { background: rgba(148,163,184,0.1); border: 1px solid rgba(148,163,184,0.2); color: var(--text-muted); border-radius: 8px; padding: 6px 16px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-delete { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #F87171; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: auto; }
.btn-add-item { width: 100%; background: rgba(52,211,153,0.05); border: 1px dashed rgba(52,211,153,0.25); color: var(--accent-green); border-radius: 10px; padding: 11px; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; margin-top: 8px; transition: all 0.2s; font-family: var(--font-body); }
.btn-add-item:hover { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.4); }

.overview-day { margin-bottom: 20px; }
.overview-day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.overview-day-name { font-size: 15px; font-weight: 700; color: var(--text-secondary); }
.overview-day-stats { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); font-weight: 600; }
.overview-day-stats.done { color: var(--accent-green); }
.mini-blocks { display: flex; gap: 3px; flex-wrap: wrap; }
.mini-block { height: 28px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.2s; }
.progress-bar { height: 3px; background: #1E293B; border-radius: 2px; margin-top: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.cat-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 14px; }
.cat-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.cat-time { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.summary-box { margin-top: 24px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 20px; }
.summary-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.stat-value { font-size: 20px; font-weight: 800; color: var(--accent-blue); font-family: var(--font-mono); text-align: center; }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; text-align: center; }
.stat-sub { font-size: 10px; color: var(--text-dark); text-align: center; }
.legend { margin-top: 28px; padding: 14px; background: rgba(30,41,59,0.3); border-radius: 12px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.ring-text { font-family: var(--font-mono); font-weight: 700; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: flex-end; justify-content: center; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); }
.modal-box { background: #111827; border: 1px solid rgba(148,163,184,0.12); border-radius: 20px 20px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 540px; max-height: 75vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 800; color: var(--text-primary); margin-bottom: 16px; }
.modal-close { float: right; background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; margin-top: -4px; }
.tpl-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.tpl-row { display: flex; align-items: center; gap: 8px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 10px 12px; }
.tpl-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text-primary); }
.tpl-meta { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
.tpl-load { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2); color: var(--accent-blue); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
.tpl-del { background: none; border: none; color: var(--text-dark); cursor: pointer; font-size: 14px; padding: 2px 6px; }
.tpl-del:hover { color: #F87171; }
.tpl-save-row { display: flex; gap: 8px; }
.tpl-input { flex: 1; background: #1E293B; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; color: var(--text-secondary); font-size: 13px; font-family: var(--font-body); }
.badge-onetime { background: rgba(167,139,250,0.15); color: var(--accent-purple); border: 1px solid rgba(167,139,250,0.3); font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 700; flex-shrink: 0; }
/* History / Streak */
.streak-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
.streak-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 16px; text-align: center; }
.streak-num { font-size: 32px; font-weight: 800; font-family: var(--font-mono); }
.streak-fire { font-size: 18px; }
.streak-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.streak-sub { font-size: 10px; color: var(--text-dark); margin-top: 2px; }
.history-bars { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 16px; }
.history-bars-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-week { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); min-width: 52px; }
.bar-track { flex: 1; height: 20px; background: #1E293B; border-radius: 5px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 6px; }
.bar-pct { font-size: 10px; font-weight: 700; color: #fff; font-family: var(--font-mono); }
.bar-sport { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); min-width: 36px; text-align: right; }
.history-empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3);
  color: var(--accent-green); padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600; z-index: 100;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
  -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(10px); } }
.toast-error { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #F87171; }

@media (max-width: 500px) {
  .item-time { min-width: 70px; font-size: 10px; }
  .item-activity { font-size: 13px; }
  .item-duration { display: none; }
  .edit-grid { grid-template-columns: 1fr; }
  .header-actions { gap: 4px; }
  .btn-sm { padding: 5px 8px; font-size: 10px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-row">
      <div>
        <div class="title">WOCHENPLAN</div>
        <div class="subtitle" id="weekInfo"></div>
      </div>
      <div class="header-actions" id="headerActions"></div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</div>
<div class="content" id="content"></div>
<div id="tplModal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeTplModal()">
  <div class="modal-box">
    <div class="modal-title">Vorlagen <button class="modal-close" onclick="closeTplModal()">✕</button></div>
    <div class="tpl-list" id="tplList"></div>
    <div class="tpl-save-row">
      <input class="tpl-input" id="tplNameInput" placeholder="Vorlagenname..." maxlength="40">
      <button class="btn-save" onclick="saveAsTemplate()">Speichern</button>
    </div>
  </div>
</div>
<canvas id="confettiCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;display:none"></canvas>
<input type="file" id="csvInput" accept=".csv,.txt" style="display:none">

<script>
const DAYS=["Mo","Di","Mi","Do","Fr","Sa","So"];
const DAY_LABELS={Mo:"Montag",Di:"Dienstag",Mi:"Mittwoch",Do:"Donnerstag",Fr:"Freitag",Sa:"Samstag",So:"Sonntag"};
const DAY_MAP={};
["mo","mon","montag","mo (arbeit)","mo(arbeit)"].forEach(k=>DAY_MAP[k]="Mo");
["di","die","dienstag","di (arbeit)","di(arbeit)"].forEach(k=>DAY_MAP[k]="Di");
["mi","mit","mittwoch","mi (arbeit)","mi(arbeit)"].forEach(k=>DAY_MAP[k]="Mi");
["do","don","donnerstag","do (arbeit)","do(arbeit)"].forEach(k=>DAY_MAP[k]="Do");
["fr","fre","freitag","fr (arbeit)","fr(arbeit)"].forEach(k=>DAY_MAP[k]="Fr");
["sa","sam","samstag","sa (arbeit)","sa(arbeit)"].forEach(k=>DAY_MAP[k]="Sa");
["so","son","sonntag","so (arbeit)","so(arbeit)"].forEach(k=>DAY_MAP[k]="So");

const CATEGORIES={
  "Morgenroutine":{color:"#F59E0B",icon:"☀️"},"Spanish":{color:"#8B5CF6",icon:"🇪🇸"},
  "Arbeit":{color:"#6B7280",icon:"💼"},"Fahrt":{color:"#9CA3AF",icon:"🚗"},
  "Sport":{color:"#EF4444",icon:"💪"},"Essen":{color:"#10B981",icon:"🍽️"},
  "ASP2/CCNA":{color:"#3B82F6",icon:"📘"},"Lesen":{color:"#EC4899",icon:"📖"},
  "Schlaf/Vorbereitung":{color:"#6366F1",icon:"🌙"},"Pause/Freizeit":{color:"#14B8A6",icon:"🎯"},
  "Planung":{color:"#F97316",icon:"📋"},
};

function categorize(a){const l=a.toLowerCase();
  if(l.includes("aufstehen")||(l.includes("frühstück")&&!l.includes("pause")))return"Morgenroutine";
  if(l.includes("dreaming spanish")||l.includes("spanish"))return"Spanish";
  if(l.includes("arbeit (inkl")||l.includes("arbeit(inkl"))return"Arbeit";
  if(l.includes("heimfahrt"))return"Fahrt";if(l.includes("sport"))return"Sport";
  if(l.includes("essen")||l.includes("mittag")||l.includes("meal prep"))return"Essen";
  if(l.includes("asp2")||l.includes("ccna")||l.includes("wiederholung"))return"ASP2/CCNA";
  if(l.includes("lesen"))return"Lesen";
  if(l.includes("vorbereitung")&&l.includes("schlaf"))return"Schlaf/Vorbereitung";
  if(l.includes("pause")||l.includes("entspannung")||l.includes("frei")||l.includes("sozial")||l.includes("regeneration")||l.includes("komplett"))return"Pause/Freizeit";
  if(l.includes("wochenplanung")||l.includes("vorbereitung"))return"Planung";return"Pause/Freizeit";}

function parseDuration(d){if(!d)return 60;if(d.includes("h")&&!d.includes("min"))return parseFloat(d)*60;if(d.includes("min"))return parseInt(d);return 60;}
function fmtMins(n){return n>=60?Math.floor(n/60)+"h"+(n%60>0?" "+n%60+"m":""):n+"m";}
function parseTimeStart(t){if(!t)return null;const m=t.match(/^(\d{1,2}):(\d{2})/);return m?+m[1]*60+ +m[2]:null;}
function parseTimeEnd(t){if(!t)return null;const m=t.match(/(\d{1,2}):(\d{2})\s*$/);return m?+m[1]*60+ +m[2]:null;}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)throw new Error("CSV braucht Header + mindestens eine Zeile");
  const fl=lines[0],sc=(fl.match(/;/g)||[]).length,co=(fl.match(/,/g)||[]).length,tb=(fl.match(/\t/g)||[]).length;
  let delim=";";if(tb>sc&&tb>co)delim="\t";else if(co>sc)delim=",";
  const headers=lines[0].split(delim).map(h=>h.trim().toLowerCase().replace(/['"]/g,""));
  const f=(...n)=>headers.findIndex(h=>n.some(x=>h.includes(x)));
  const cT=f("tag","day","wochentag"),cTi=f("uhrzeit","zeit","time","von","start"),
    cA=f("aktivität","aktivitat","activity","aufgabe","task","beschreibung"),
    cD=f("dauer","duration","länge"),cC=f("kritisch","critical","wichtig","prio"),
    cN=f("notiz","notes","anmerkung","kommentar","hinweis");
  if(cT===-1||cA===-1)throw new Error("CSV braucht mindestens 'Tag' und 'Aktivität' Spalten");
  const items=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(delim).map(c=>c.trim().replace(/^['"]|['"]$/g,""));
    if(!cols[cT]&&!cols[cA])continue;
    const raw=(cols[cT]||"").toLowerCase().trim(),clean=raw.replace(/\(.*?\)/g,"").trim();
    const day=DAY_MAP[raw]||DAY_MAP[clean]||null;if(!day)continue;
    items.push({day,time:cTi!==-1?(cols[cTi]||""):"",activity:cols[cA]||"",
      duration:cD!==-1?(cols[cD]||"60min"):"60min",critical:cC!==-1?(cols[cC]||"Nein"):"Nein",
      notes:cN!==-1?(cols[cN]||""):""});
  }
  if(items.length===0)throw new Error("Keine Einträge gefunden. 'Tag' muss Mo/Di/Mi/... enthalten.");
  return items;
}

function handleCSVUpload(file){
  const tryParse=(encoding)=>{const r=new FileReader();
    r.onload=function(e){
      const text=e.target.result;
      if(encoding==="UTF-8"&&/\ufffd/.test(text)){tryParse("ISO-8859-1");return;}
      try{const items=parseCSV(text);schedule=items;checked={};saveData();toast("✓ "+items.length+" Einträge importiert");render();}
      catch(err){toast("✗ "+err.message,true);}};
    r.readAsText(file,encoding);};
  tryParse("UTF-8");
}

function launchConfetti(){
  const canvas=document.getElementById("confettiCanvas");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  canvas.style.display="block";
  const ctx=canvas.getContext("2d");
  const colors=["#60A5FA","#A78BFA","#34D399","#F59E0B","#F472B6","#FB923C"];
  const particles=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,y:-10,
    vx:(Math.random()-0.5)*4,vy:Math.random()*4+2,
    color:colors[Math.floor(Math.random()*colors.length)],
    size:Math.random()*8+4,rot:Math.random()*360,rotV:(Math.random()-0.5)*8,
    shape:Math.random()>0.5?"rect":"circle"
  }));
  let frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.rot+=p.rotV;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-frame/160);
      if(p.shape==="rect"){ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);}
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    frame++;
    if(frame<180)requestAnimationFrame(animate);else{canvas.style.display="none";ctx.clearRect(0,0,canvas.width,canvas.height);}
  }
  animate();
}

function attachSwipeListeners(){
  document.querySelectorAll(".item[data-key]").forEach(el=>{
    let startX=0,startY=0,swiped=false;
    el.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;swiped=false;},{passive:true});
    el.addEventListener("touchmove",e=>{
      const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){
        swiped=true;
        el.style.transform=`translateX(${Math.max(-70,Math.min(70,dx*0.55))}px)`;
        el.style.transition="none";e.preventDefault();
      }
    },{passive:false});
    el.addEventListener("touchend",e=>{
      const dx=e.changedTouches[0].clientX-startX;
      el.style.transition="transform 0.2s ease";el.style.transform="";
      if(swiped&&Math.abs(dx)>60){e.preventDefault();toggle(el.getAttribute("data-key"));}
      setTimeout(()=>{el.style.transition="";},200);
    },{passive:false});
  });
}

    const key=item.day+"-"+item.globalIdx,isDone=!!checked[key],cat=categorize(item.activity),ci=CATEGORIES[cat]||CATEGORIES["Pause/Freizeit"];
    const startM=parseTimeStart(item.time),endM=parseTimeEnd(item.time);
    const isNow=isToday&&startM!==null&&endM!==null&&nowMins>=startM&&nowMins<endM;
    if(editIdx===item.globalIdx){
      h+=`<div class="edit-form" id="editForm">
        <div class="edit-form-title">✎ Eintrag bearbeiten</div>
        <div class="edit-grid">
          <div><label class="edit-label">Aktivität</label><input class="edit-input" name="activity" value="${esc(item.activity)}"></div>
          <div><label class="edit-label">Uhrzeit</label><input class="edit-input mono" name="time" value="${esc(item.time)}"></div>
          <div><label class="edit-label">Dauer</label><input class="edit-input mono" name="duration" value="${esc(item.duration)}"></div>
          <div><label class="edit-label">Kritisch</label><select class="edit-select" name="critical">${editOpts.map(o=>`<option${item.critical===o?" selected":""}>${o}</option>`).join("")}</select></div>
        </div>
        <div style="margin-bottom:10px"><label class="edit-label">Notizen</label><input class="edit-input" name="notes" value="${esc(item.notes)}"></div>
        <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px">
          <input type="checkbox" name="oneTime" id="oneTimeChk" ${item.oneTime?"checked":""} style="accent-color:var(--accent-purple);width:16px;height:16px">
          <label for="oneTimeChk" style="font-size:12px;color:var(--text-muted);cursor:pointer">Einmalig (nach Abhaken entfernen)</label>
        </div>
        <div class="edit-actions">
          <button class="btn-save" onclick="saveEdit()">Speichern</button>
          <button class="btn-cancel" onclick="cancelEdit()">Abbrechen</button>
          <button class="btn-delete" onclick="deleteItem(${item.globalIdx})">Löschen</button>
        </div></div>`;
      return;
    }
    h+=`<div class="item${isDone?" checked":""}${isNow?" time-now":""}" data-key="${key}" onclick="toggle('${key}')">
      <div class="checkbox"><span class="check-mark">✓</span></div>
      <div class="item-time">${esc(item.time)}${isNow?'<span class="now-badge">JETZT</span>':""}</div>
      <div class="cat-dot" style="background:${ci.color}"></div>
      <div class="item-content">
        <div class="item-activity">${esc(item.activity)}</div>
        ${item.notes?`<div class="item-notes">${esc(item.notes)}</div>`:""}
      </div>
      <div class="item-duration">${esc(item.duration)}</div>
      ${item.oneTime?'<span class="badge-onetime">einmalig</span>':""}
      ${badgeHTML(item.critical)}
      <button class="btn-edit" onclick="event.stopPropagation();startEdit(${item.globalIdx})">✎</button>
    </div>`;
  });
  h+='</div>';
  if(isAdding){
    h+=`<div class="edit-form" id="addForm" style="margin-top:8px">
      <div class="edit-form-title">+ Neuer Eintrag — ${DAY_LABELS[selectedDay]}</div>
      <div class="edit-grid">
        <div><label class="edit-label">Aktivität *</label><input class="edit-input" name="activity" placeholder="z.B. Sport" autofocus></div>
        <div><label class="edit-label">Uhrzeit</label><input class="edit-input mono" name="time" placeholder="08:00-09:00"></div>
        <div><label class="edit-label">Dauer</label><input class="edit-input mono" name="duration" value="60min"></div>
        <div><label class="edit-label">Kritisch</label><select class="edit-select" name="critical">${["Nein","Ja","JA!!!","Mittel","Niedrig"].map(o=>`<option>${o}</option>`).join("")}</select></div>
      </div>
      <div style="margin-bottom:10px"><label class="edit-label">Notizen</label><input class="edit-input" name="notes" placeholder="Optional..."></div>
      <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px">
        <input type="checkbox" name="oneTime" id="oneTimeChkNew" style="accent-color:var(--accent-purple);width:16px;height:16px">
        <label for="oneTimeChkNew" style="font-size:12px;color:var(--text-muted);cursor:pointer">Einmalig (nach Abhaken entfernen)</label>
      </div>
      <div class="edit-actions">
        <button class="btn-save" onclick="saveNewItem()">Hinzufügen</button>
        <button class="btn-cancel" onclick="cancelAdd()">Abbrechen</button>
      </div></div>`;
  } else {
    h+=`<button class="btn-add-item" onclick="addItem()">+ Neuen Eintrag hinzufügen</button>`;
  }
  c.innerHTML=h;
  attachSwipeListeners();
}

function renderOverview(c,ds){
  let h='<div style="padding-top:20px"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text-primary)">Wochenübersicht</h2>';
  DAYS.forEach(d=>{const items=schedule.map((s,i)=>({...s,idx:i})).filter(s=>s.day===d);if(!items.length)return;
    const s=ds[d],pct=s.total>0?Math.round(s.done/s.total*100):0;
    h+=`<div class="overview-day"><div class="overview-day-header"><div class="overview-day-name">${DAY_LABELS[d]}</div><div class="overview-day-stats${pct===100?" done":""}">${s.done}/${s.total} — ${pct}%</div></div><div class="mini-blocks">`;
    items.forEach(item=>{const cat=categorize(item.activity),ci=CATEGORIES[cat]||CATEGORIES["Pause/Freizeit"],key=item.day+"-"+item.idx,isDone=!!checked[key],w=Math.max(30,Math.min(120,parseDuration(item.duration)/2));
      h+=`<div class="mini-block" onclick="toggle('${key}')" title="${esc(item.activity)} (${item.duration})" style="width:${w}px;background:${isDone?"rgba(52,211,153,0.2)":ci.color+"22"};border:1.5px solid ${isDone?"rgba(52,211,153,0.4)":ci.color+"33"}">${isDone?'<span style="color:var(--accent-green);font-weight:700">✓</span>':`<span style="color:${ci.color};opacity:0.7">${ci.icon}</span>`}</div>`;});
    h+=`</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct===100?"var(--accent-green)":"linear-gradient(90deg,#3B82F6,#8B5CF6)"}"></div></div></div>`;});
  h+='</div>';c.innerHTML=h;
}

function renderProgress(c){
  const cs=getCatStats();let h='<div style="padding-top:20px"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text-primary)">Fortschritt nach Kategorie</h2><div class="cat-grid">';
  Object.entries(cs).filter(([,v])=>v.planned>0).sort((a,b)=>b[1].planned-a[1].planned).forEach(([cat,st])=>{
    const ci=CATEGORIES[cat]||CATEGORIES["Pause/Freizeit"],pct=st.planned>0?(st.done/st.planned)*100:0;
    h+=`<div class="cat-card">${ringHTML(pct,ci.color)}<div><div class="cat-name">${ci.icon} ${cat}</div><div class="cat-time">${fmtMins(st.done)} / ${fmtMins(st.planned)}</div></div></div>`;});
  h+='</div>';
  const tI=schedule.length,dI=Object.values(checked).filter(Boolean).length,
    tM=schedule.reduce((a,s)=>a+parseDuration(s.duration),0),
    dM=schedule.reduce((a,s,i)=>checked[s.day+"-"+i]?a+parseDuration(s.duration):a,0),
    spD=schedule.filter((s,i)=>categorize(s.activity)==="Sport"&&checked[s.day+"-"+i]).length,
    spT=schedule.filter(s=>categorize(s.activity)==="Sport").length,
    snD=schedule.filter((s,i)=>categorize(s.activity)==="Spanish"&&checked[s.day+"-"+i]).length,
    snT=schedule.filter(s=>categorize(s.activity)==="Spanish").length;
  h+=`<div class="summary-box"><div class="summary-title">Wochenzusammenfassung</div><div class="summary-grid">
    <div><div class="stat-value">${dI}/${tI}</div><div class="stat-label">Einträge erledigt</div><div class="stat-sub">${tI>0?Math.round(dI/tI*100):0}%</div></div>
    <div><div class="stat-value">${fmtMins(dM)}</div><div class="stat-label">Zeit geschafft</div><div class="stat-sub">von ${fmtMins(tM)}</div></div>
    <div><div class="stat-value">${spD}/${spT}</div><div class="stat-label">Sport Sessions</div></div>
    <div><div class="stat-value">${snD}/${snT}</div><div class="stat-label">Spanish Sessions</div></div>
  </div></div></div>`;c.innerHTML=h;
}

function getStreaks(){
  const h=loadHistory();
  const weeks=Object.keys(h).sort();
  let sp=0,sn=0,ov=0;
  for(let i=weeks.length-1;i>=0;i--){const w=h[weeks[i]];if(w.sport>0)sp++;else break;}
  for(let i=weeks.length-1;i>=0;i--){const w=h[weeks[i]];if(w.spanish>0)sn++;else break;}
  for(let i=weeks.length-1;i>=0;i--){const w=h[weeks[i]];if(w.pct>=70)ov++;else break;}
  return{sport:sp,spanish:sn,overall:ov};
}

function renderHistory(c){
  const h=loadHistory();
  const weeks=Object.keys(h).sort();
  const st=getStreaks();
  let html='<div style="padding-top:20px"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text-primary)">Verlauf & Streaks</h2>';
  html+=`<div class="streak-grid">
    <div class="streak-card"><div class="streak-num" style="color:#EF4444">${st.sport}<span class="streak-fire">${st.sport>0?"🔥":""}</span></div><div class="streak-label">Sport Streak</div><div class="streak-sub">Wochen in Folge</div></div>
    <div class="streak-card"><div class="streak-num" style="color:#8B5CF6">${st.spanish}<span class="streak-fire">${st.spanish>0?"🔥":""}</span></div><div class="streak-label">Spanish Streak</div><div class="streak-sub">Wochen in Folge</div></div>
    <div class="streak-card"><div class="streak-num" style="color:var(--accent-blue)">${st.overall}<span class="streak-fire">${st.overall>0?"🔥":""}</span></div><div class="streak-label">Gesamt ≥70%</div><div class="streak-sub">Wochen in Folge</div></div>
  </div>`;
  if(!weeks.length){
    html+='<div class="history-empty">📊 Noch keine Daten — nach dem ersten Wochenwechsel erscheint hier dein Verlauf</div>';
  } else {
    html+='<div class="history-bars"><div class="history-bars-title">Wöchentlicher Fortschritt</div>';
    weeks.slice(-10).reverse().forEach(wid=>{
      const w=h[wid];
      const color=w.pct>=80?"var(--accent-green)":w.pct>=50?"var(--accent-blue)":"#F59E0B";
      const label=wid.replace(/\d{4}-/,"");
      html+=`<div class="bar-row">
        <div class="bar-week">${label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${w.pct}%;background:${color}"><span class="bar-pct">${w.pct>10?w.pct+"%":""}</span></div></div>
        <div class="bar-sport">💪${w.sport} 🇪🇸${w.spanish}</div>
      </div>`;
    });
    html+='</div>';
  }
  // Current week preview
  const tI=schedule.length,dI=Object.values(checked).filter(Boolean).length;
  const curPct=tI>0?Math.round(dI/tI*100):0;
  const curColor=curPct>=80?"var(--accent-green)":curPct>=50?"var(--accent-blue)":"#F59E0B";
  html+=`<div class="history-bars" style="margin-top:12px"><div class="history-bars-title">Diese Woche (${getWeekId().replace(/\d{4}-/,"")})</div>
    <div class="bar-row">
      <div class="bar-week">aktuell</div>
      <div class="bar-track"><div class="bar-fill" style="width:${curPct}%;background:${curColor}"><span class="bar-pct">${curPct>10?curPct+"%":""}</span></div></div>
      <div class="bar-sport">${dI}/${tI}</div>
    </div></div>`;
  html+='</div>';
  c.innerHTML=html;
}

document.getElementById("csvInput").addEventListener("change",e=>{if(e.target.files[0])handleCSVUpload(e.target.files[0]);e.target.value="";});
window.addEventListener("online",render);
window.addEventListener("offline",render);
loadData();render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
