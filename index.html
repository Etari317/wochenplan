<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wochenplan">
<meta name="theme-color" content="#0B0F19">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Wochenplan</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0B0F19;
  --bg-secondary: #111827;
  --bg-card: rgba(30,41,59,0.5);
  --bg-card-hover: rgba(30,41,59,0.7);
  --border-subtle: rgba(148,163,184,0.06);
  --text-primary: #F1F5F9;
  --text-secondary: #E2E8F0;
  --text-muted: #94A3B8;
  --text-dim: #64748B;
  --text-dark: #475569;
  --accent-blue: #60A5FA;
  --accent-purple: #A78BFA;
  --accent-green: #34D399;
  --accent-amber: #F59E0B;
  --accent-red: #EF4444;
  --font-body: 'Outfit', 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  min-height: 100%;
  background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #0F172A 100%);
  color: var(--text-secondary);
  font-family: var(--font-body);
  -webkit-tap-highlight-color: transparent;
  padding-bottom: calc(40px + var(--safe-bottom));
  overflow-x: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, rgba(59,130,246,0.12) 0%, rgba(139,92,246,0.08) 100%);
  border-bottom: 1px solid rgba(148,163,184,0.08);
  padding: calc(16px + var(--safe-top)) 20px 14px;
  position: sticky; top: 0; z-index: 50;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
}
.header-inner { max-width: 900px; margin: 0 auto; }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.title {
  font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }
.btn-reset {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
  color: #F87171; border-radius: 8px; padding: 6px 12px; font-size: 11px;
  cursor: pointer; font-family: var(--font-mono); font-weight: 600;
}
.tabs { display: flex; gap: 4px; }
.tab {
  padding: 7px 16px; border-radius: 8px; border: none;
  background: transparent; color: var(--text-dim);
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: var(--font-body); transition: all 0.2s;
}
.tab.active { background: rgba(96,165,250,0.15); color: var(--accent-blue); }

/* Content */
.content { max-width: 900px; margin: 0 auto; padding: 0 16px; }

/* Day Selector */
.day-selector { display: flex; gap: 6px; padding: 20px 0 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.day-btn {
  flex: 1; min-width: 50px; padding: 10px 4px 8px; border-radius: 12px; border: none;
  background: rgba(30,41,59,0.5); cursor: pointer; text-align: center;
  transition: all 0.2s;
}
.day-btn.active {
  background: linear-gradient(135deg, rgba(96,165,250,0.2), rgba(139,92,246,0.15));
  box-shadow: 0 0 0 1px rgba(96,165,250,0.3);
}
.day-btn-label { font-size: 13px; font-weight: 600; color: var(--text-muted); font-family: var(--font-mono); }
.day-btn.active .day-btn-label { font-weight: 800; color: var(--accent-blue); }
.day-btn-count { font-size: 9px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 3px; }
.day-btn-count.done { color: var(--accent-green); }
.day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-blue); margin: 4px auto 0; }

/* Day Title */
.day-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); }
.day-title span { font-size: 13px; color: var(--text-dim); font-weight: 400; margin-left: 10px; }

/* Schedule Items */
.items { display: flex; flex-direction: column; gap: 6px; }
.item {
  background: var(--bg-card); border-radius: 12px; padding: 12px 14px;
  border: 1px solid var(--border-subtle); cursor: pointer;
  transition: all 0.25s cubic-bezier(.4,0,.2,1);
  display: flex; align-items: center; gap: 12px;
}
.item.checked { background: rgba(52,211,153,0.06); border-color: rgba(52,211,153,0.15); opacity: 0.65; }
.checkbox {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  border: 2px solid var(--text-dark); background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.item.checked .checkbox { border-color: var(--accent-green); background: rgba(52,211,153,0.15); }
.check-mark { color: var(--accent-green); font-size: 13px; font-weight: 700; display: none; }
.item.checked .check-mark { display: block; }
.item-time { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); min-width: 86px; flex-shrink: 0; font-weight: 500; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.item-content { flex: 1; min-width: 0; }
.item-activity { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
.item.checked .item-activity { text-decoration: line-through; color: var(--text-dim); }
.item-notes { font-size: 11px; color: var(--accent-amber); margin-top: 3px; font-weight: 500; }
.item-duration { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); flex-shrink: 0; font-weight: 500; }
.badge {
  font-size: 10px; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;
  text-transform: uppercase; white-space: nowrap; font-weight: 700; flex-shrink: 0;
}
.badge-crit { background: #DC2626; color: #fff; font-weight: 800; }
.badge-high { background: #F59E0B; color: #78350F; }
.badge-mid { background: #60A5FA; color: #1E3A5F; }
.badge-low { background: #A7F3D0; color: #065F46; }
.btn-edit {
  background: none; border: none; color: var(--text-dark);
  cursor: pointer; font-size: 14px; padding: 4px; flex-shrink: 0;
}

/* Edit Form */
.edit-form {
  background: rgba(30,41,59,0.8); border-radius: 12px; padding: 16px;
  border: 1px solid rgba(96,165,250,0.3);
}
.edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.edit-label { font-size: 10px; color: var(--text-dim); font-weight: 600; display: block; margin-bottom: 3px; }
.edit-input, .edit-select {
  width: 100%; background: #1E293B; border: 1px solid #334155; border-radius: 6px;
  padding: 6px 10px; color: var(--text-secondary); font-size: 13px;
  font-family: var(--font-body);
}
.edit-input.mono { font-family: var(--font-mono); }
.edit-actions { display: flex; gap: 8px; }
.btn-save {
  background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3);
  color: var(--accent-green); border-radius: 8px; padding: 6px 16px;
  font-size: 12px; font-weight: 600; cursor: pointer;
}
.btn-cancel {
  background: rgba(148,163,184,0.1); border: 1px solid rgba(148,163,184,0.2);
  color: var(--text-muted); border-radius: 8px; padding: 6px 16px;
  font-size: 12px; font-weight: 600; cursor: pointer;
}

/* Overview */
.overview-day { margin-bottom: 20px; }
.overview-day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.overview-day-name { font-size: 15px; font-weight: 700; color: var(--text-secondary); }
.overview-day-stats { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); font-weight: 600; }
.overview-day-stats.done { color: var(--accent-green); }
.mini-blocks { display: flex; gap: 3px; flex-wrap: wrap; }
.mini-block {
  height: 28px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; transition: all 0.2s;
}
.progress-bar { height: 3px; background: #1E293B; border-radius: 2px; margin-top: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

/* Progress View */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.cat-card {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 14px;
}
.cat-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.cat-time { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 3px; }

.summary-box {
  margin-top: 24px; background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 14px; padding: 20px;
}
.summary-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.stat-value { font-size: 20px; font-weight: 800; color: var(--accent-blue); font-family: var(--font-mono); text-align: center; }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; text-align: center; }
.stat-sub { font-size: 10px; color: var(--text-dark); text-align: center; }

/* Legend */
.legend {
  margin-top: 28px; padding: 14px; background: rgba(30,41,59,0.3);
  border-radius: 12px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* SVG ring text */
.ring-text { font-family: var(--font-mono); font-weight: 700; }

@media (max-width: 500px) {
  .item-time { min-width: 70px; font-size: 10px; }
  .item-activity { font-size: 13px; }
  .item-duration { display: none; }
  .edit-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<script>
// ─── DATA ────────────────────────────────────────────────────────────
const DAYS = ["Mo","Di","Mi","Do","Fr","Sa","So"];

  "Morgenroutine":     {color:"#F59E0B",icon:"☀️"},

  "Planung":           {color:"#F97316",icon:"📋"},

function categorize(a) {
  const l = a.toLowerCase();
  if (l.includes("aufstehen") || l.includes("frühstück") && !l.includes("pause")) return "Morgenroutine";
  if (l.includes("dreaming spanish") || l.includes("spanish")) return "Spanish";
  if (l.includes("arbeit (inkl")) return "Arbeit";
  if (l.includes("heimfahrt")) return "Fahrt";
  if (l.includes("sport")) return "Sport";
  if (l.includes("essen") || l.includes("mittag") || l.includes("meal prep")) return "Essen";
  if (l.includes("asp2") || l.includes("ccna") || l.includes("wiederholung")) return "ASP2/CCNA";
  if (l.includes("lesen")) return "Lesen";
  if (l.includes("vorbereitung") && l.includes("schlaf")) return "Schlaf/Vorbereitung";
  if (l.includes("pause") || l.includes("entspannung") || l.includes("frei") || l.includes("sozial") || l.includes("regeneration") || l.includes("komplett")) return "Pause/Freizeit";
  if (l.includes("wochenplanung") || l.includes("vorbereitung")) return "Planung";
  return "Pause/Freizeit";
}

function parseDuration(d) {
  if (d.includes("h") && !d.includes("min")) return parseFloat(d) * 60;
  if (d.includes("min")) return parseInt(d);
  return 60;
}

function fmtMins(n) { return n >= 60 ? Math.floor(n/60)+"h"+(n%60>0?" "+n%60+"m":"") : n+"m"; }

  {day:"Mo",time:"19:30-20:30",activity:"ASP2 Wiederholung",duration:"60min",critical:"Ja",notes:"NUR Wiederholung, kein neuer Stoff"},
  {day:"Mo",time:"20:30-21:15",activity:"Lesen",duration:"45min",critical:"Ja",notes:"Vor dem Schlafen"},
  {day:"Mo",time:"21:15-22:30",activity:"Vorbereitung + Schlafen",duration:"75min",critical:"Ja",notes:"Tasche packen, Klamotten rauslegen"},

];

// ─── STATE ───────────────────────────────────────────────────────────
const STORE_KEY = "wochenplan-data-v2";
let schedule = [...DEFAULT_SCHEDULE];
let checked = {};
let selectedDay = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
let currentView = "day";
let editIdx = null;

function getWeekId() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  const diff = now - start;
  return now.getFullYear() + "-W" + Math.ceil(diff / 604800000);
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data.weekId !== getWeekId()) { checked = {}; }
      else { checked = data.checked || {}; }
      if (data.schedule) schedule = data.schedule;
    }
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      weekId: getWeekId(), checked, schedule
    }));
  } catch(e) {}
}

function resetWeek() {
  if (!confirm("Alle Haken für diese Woche zurücksetzen?")) return;
  checked = {};
  saveData();
  render();
}

function toggle(key) {
  checked[key] = !checked[key];
  if (!checked[key]) delete checked[key];
  saveData();
  render();
}

function setDay(d) { selectedDay = d; editIdx = null; render(); }
function setView(v) { currentView = v; editIdx = null; render(); }
function startEdit(idx) { editIdx = idx; render(); }
function cancelEdit() { editIdx = null; render(); }

function saveEdit() {
  const form = document.getElementById("editForm");
  if (!form) return;
  schedule[editIdx] = {
    ...schedule[editIdx],
    activity: form.querySelector('[name=activity]').value,
    time: form.querySelector('[name=time]').value,
    duration: form.querySelector('[name=duration]').value,
    critical: form.querySelector('[name=critical]').value,
    notes: form.querySelector('[name=notes]').value,
  };
  editIdx = null;
  saveData();
  render();
}

// ─── HELPERS ─────────────────────────────────────────────────────────
function badgeHTML(level) {
  if (!level) return "";
  const l = level.toLowerCase();
  if (l === "nein") return "";
  if (l.includes("!!!")) return `<span class="badge badge-crit">KRITISCH</span>`;
  if (l === "ja" || l === "ja!") return `<span class="badge badge-high">Wichtig</span>`;
  if (l === "mittel") return `<span class="badge badge-mid">Mittel</span>`;
  if (l === "niedrig") return `<span class="badge badge-low">Optional</span>`;
  return `<span class="badge badge-high">Wichtig</span>`;
}

function ringHTML(pct, color, size) {
  size = size || 54;
  const r = (size - 6) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1F2937" stroke-width="4" opacity="0.2"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
      style="transition:stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1)"/>
    <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central"
      class="ring-text" style="transform:rotate(90deg);transform-origin:center;font-size:13px;fill:${color}">${Math.round(pct)}%</text>
  </svg>`;
}

function getDayStats() {
  const stats = {};
  DAYS.forEach(d => {
    const items = schedule.map((s,i) => ({...s,idx:i})).filter(s => s.day === d);
    stats[d] = { total: items.length, done: items.filter(s => checked[s.day+"-"+s.idx]).length };
  });
  return stats;
}

function getCatStats() {
  const stats = {};
  schedule.forEach((item, i) => {
    const cat = categorize(item.activity);
    if (!stats[cat]) stats[cat] = {planned:0,done:0};
    const mins = parseDuration(item.duration);
    stats[cat].planned += mins;
    if (checked[item.day+"-"+i]) stats[cat].done += mins;
  });
  return stats;
}

// ─── RENDER ──────────────────────────────────────────────────────────
function render() {
  // Week info
  const wid = getWeekId();
  document.getElementById("weekInfo").textContent =
    "KW " + wid.split("W")[1] + " · " + new Date().toLocaleDateString("de-DE",{day:"numeric",month:"long",year:"numeric"});

  // Tabs
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = [{id:"day",label:"Tagesansicht"},{id:"overview",label:"Wochenübersicht"},{id:"progress",label:"Fortschritt"}]
    .map(t => `<button class="tab${currentView===t.id?" active":""}" onclick="setView('${t.id}')">${t.label}</button>`).join("");

  const c = document.getElementById("content");
  const ds = getDayStats();
  const todayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

  if (currentView === "day") {
    renderDay(c, ds, todayIdx);
  } else if (currentView === "overview") {
    renderOverview(c, ds);
  } else {
    renderProgress(c);
  }

  // Legend
  c.innerHTML += `<div class="legend">${Object.entries(CATEGORIES).map(([n,info]) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${info.color}"></div>${info.icon} ${n}</div>`
  ).join("")}</div>`;
}

function renderDay(c, ds, todayIdx) {
  // Day selector
  let html = `<div class="day-selector">`;
  DAYS.forEach((d, i) => {
    const s = ds[d];
    const pct = s.total > 0 ? s.done / s.total * 100 : 0;
    html += `<button class="day-btn${selectedDay===d?" active":""}" onclick="setDay('${d}')">
      <div class="day-btn-label">${d}</div>
      <div class="day-btn-count${pct===100&&s.total>0?" done":""}">${s.done}/${s.total}</div>
      ${i===todayIdx?'<div class="day-dot"></div>':""}
      ${pct===100&&s.total>0?'<div style="font-size:10px;margin-top:2px">✓</div>':""}
    </button>`;
  });
  html += `</div>`;

  const dayItems = schedule.map((s,i)=>({...s,globalIdx:i})).filter(s=>s.day===selectedDay);

  html += `<div class="day-title">${DAY_LABELS[selectedDay]}<span>${dayItems.length} Einträge</span></div>`;
  html += `<div class="items">`;

  dayItems.forEach(item => {
    const key = item.day + "-" + item.globalIdx;
    const isDone = !!checked[key];
    const cat = categorize(item.activity);
    const catInfo = CATEGORIES[cat] || CATEGORIES["Pause/Freizeit"];

    if (editIdx === item.globalIdx) {
      html += `<div class="edit-form" id="editForm">
        <div class="edit-grid">
          <div><label class="edit-label">Aktivität</label><input class="edit-input" name="activity" value="${esc(item.activity)}"></div>
          <div><label class="edit-label">Uhrzeit</label><input class="edit-input mono" name="time" value="${esc(item.time)}"></div>
          <div><label class="edit-label">Dauer</label><input class="edit-input mono" name="duration" value="${esc(item.duration)}"></div>
          <div><label class="edit-label">Kritisch</label>
            <select class="edit-select" name="critical">
              ${["Nein","Ja","JA!!!","Mittel","Niedrig"].map(o=>`<option${item.critical===o?" selected":""}>${o}</option>`).join("")}
            </select>
          </div>
        </div>
        <div style="margin-bottom:10px"><label class="edit-label">Notizen</label><input class="edit-input" name="notes" value="${esc(item.notes)}"></div>
        <div class="edit-actions">
          <button class="btn-save" onclick="saveEdit()">Speichern</button>
          <button class="btn-cancel" onclick="cancelEdit()">Abbrechen</button>
        </div>
      </div>`;
      return;
    }

    html += `<div class="item${isDone?" checked":""}" onclick="toggle('${key}')">
      <div class="checkbox"><span class="check-mark">✓</span></div>
      <div class="item-time">${item.time}</div>
      <div class="cat-dot" style="background:${catInfo.color}"></div>
      <div class="item-content">
        <div class="item-activity">${esc(item.activity)}</div>
        ${item.notes?`<div class="item-notes">${esc(item.notes)}</div>`:""}
      </div>
      <div class="item-duration">${item.duration}</div>
      ${badgeHTML(item.critical)}
      <button class="btn-edit" onclick="event.stopPropagation();startEdit(${item.globalIdx})">✎</button>
    </div>`;
  });

  html += `</div>`;
  c.innerHTML = html;
}

function renderOverview(c, ds) {
  let html = `<div style="padding-top:20px"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text-primary)">Wochenübersicht</h2>`;

  DAYS.forEach(d => {
    const items = schedule.map((s,i)=>({...s,idx:i})).filter(s=>s.day===d);
    const s = ds[d];
    const pct = s.total > 0 ? Math.round(s.done/s.total*100) : 0;

    html += `<div class="overview-day">
      <div class="overview-day-header">
        <div class="overview-day-name">${DAY_LABELS[d]}</div>
        <div class="overview-day-stats${pct===100?" done":""}">${s.done}/${s.total} — ${pct}%</div>
      </div>
      <div class="mini-blocks">`;

    items.forEach(item => {
      const cat = categorize(item.activity);
      const catInfo = CATEGORIES[cat] || CATEGORIES["Pause/Freizeit"];
      const key = item.day+"-"+item.idx;
      const isDone = !!checked[key];
      const mins = parseDuration(item.duration);
      const w = Math.max(30, Math.min(120, mins/2));
      html += `<div class="mini-block" onclick="toggle('${key}')" title="${esc(item.activity)} (${item.duration})"
        style="width:${w}px;background:${isDone?"rgba(52,211,153,0.2)":catInfo.color+"22"};border:1.5px solid ${isDone?"rgba(52,211,153,0.4)":catInfo.color+"33"}">
        ${isDone?'<span style="color:var(--accent-green);font-weight:700">✓</span>':`<span style="color:${catInfo.color};opacity:0.7">${catInfo.icon}</span>`}
      </div>`;
    });

    html += `</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct===100?"var(--accent-green)":"linear-gradient(90deg,#3B82F6,#8B5CF6)"}"></div></div></div>`;
  });

  html += `</div>`;
  c.innerHTML = html;
}

function renderProgress(c) {
  const catStats = getCatStats();
  let html = `<div style="padding-top:20px"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text-primary)">Fortschritt nach Kategorie</h2>`;
  html += `<div class="cat-grid">`;

  Object.entries(catStats)
    .filter(([,v])=>v.planned>0)
    .sort((a,b)=>b[1].planned-a[1].planned)
    .forEach(([cat,stats]) => {
      const catInfo = CATEGORIES[cat] || CATEGORIES["Pause/Freizeit"];
      const pct = stats.planned > 0 ? (stats.done/stats.planned)*100 : 0;
      html += `<div class="cat-card">
        ${ringHTML(pct, catInfo.color)}
        <div>
          <div class="cat-name">${catInfo.icon} ${cat}</div>
          <div class="cat-time">${fmtMins(stats.done)} / ${fmtMins(stats.planned)}</div>
        </div>
      </div>`;
    });

  html += `</div>`;

  // Summary
  const totalItems = schedule.length;
  const doneItems = Object.values(checked).filter(Boolean).length;
  const totalMins = schedule.reduce((a,s) => a + parseDuration(s.duration), 0);
  const doneMins = schedule.reduce((a,s,i) => checked[s.day+"-"+i] ? a + parseDuration(s.duration) : a, 0);
  const sportDone = schedule.filter((s,i) => categorize(s.activity)==="Sport" && checked[s.day+"-"+i]).length;
  const sportTotal = schedule.filter(s => categorize(s.activity)==="Sport").length;
  const spanDone = schedule.filter((s,i) => categorize(s.activity)==="Spanish" && checked[s.day+"-"+i]).length;
  const spanTotal = schedule.filter(s => categorize(s.activity)==="Spanish").length;

  html += `<div class="summary-box">
    <div class="summary-title">Wochenzusammenfassung</div>
    <div class="summary-grid">
      <div><div class="stat-value">${doneItems}/${totalItems}</div><div class="stat-label">Einträge erledigt</div><div class="stat-sub">${Math.round(doneItems/totalItems*100)}%</div></div>
      <div><div class="stat-value">${fmtMins(doneMins)}</div><div class="stat-label">Zeit geschafft</div><div class="stat-sub">von ${fmtMins(totalMins)}</div></div>
      <div><div class="stat-value">${sportDone}/${sportTotal}</div><div class="stat-label">Sport Sessions</div></div>
      <div><div class="stat-value">${spanDone}/${spanTotal}</div><div class="stat-label">Spanish Sessions</div></div>
    </div>
  </div>`;

  html += `</div>`;
  c.innerHTML = html;
}

function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ─── INIT ────────────────────────────────────────────────────────────
loadData();
render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
